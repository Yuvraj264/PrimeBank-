version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build:
      context: ./server
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://host.docker.internal:27017/primebank
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=yoursecret
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
      - rabbitmq

  backend2:
    build:
      context: ./server
    ports:
      - "5002:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://host.docker.internal:27017/primebank
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=yoursecret
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
      - rabbitmq

  backend3:
    build:
      context: ./server
    ports:
      - "5003:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://host.docker.internal:27017/primebank
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=yoursecret
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
      - rabbitmq

  backend_worker:
    build:
      context: ./server
    command: npm run start:worker
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://host.docker.internal:27017/primebank
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=yoursecret
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
      - rabbitmq

  mongo:
    image: mongo:latest
    ports:
      - "27018:27017" # using 27018 externally to avoid collision if local mongo runs on 27017
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379" # using 6379 externally so local dev works
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
